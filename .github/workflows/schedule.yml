name: Railway Schedule

on:
  schedule:
    - cron: '0 6 * * *'   # Arrancar a las 6:00 UTC (8:00 España verano)
    - cron: '0 21 * * *'  # Pausar a las 21:00 UTC (23:00 España verano)
  workflow_dispatch:

jobs:
  wake:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Resume weights-api service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway redeploy --service 6401da8d-7670-4320-940e-73024348b2f8 --yes

  sleep:
    if: github.event.schedule == '0 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Pause weights-api service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway down --service 6401da8d-7670-4320-940e-73024348b2f8 --yes